name: Build Installers
on:
  repository_dispatch:
    types: [build-installer]
  workflow_dispatch:
    inputs:
      serverUrl:
        description: 'Remote server URL (e.g. https://your-server.com:3000)'
        required: false
        default: ''

env:
  NODE_VERSION: '22'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - macos-latest
          - ubuntu-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @ccmodels/shared build

      - name: Write installer config
        shell: node {0}
        run: |
          const fs = require('fs');
          const payload = process.env.PAYLOAD;
          const serverUrl = process.env.SERVER_URL;
          let config = {};
          if (payload && payload !== 'null' && payload !== '') {
            try { config = JSON.parse(payload); } catch {}
          } else if (serverUrl) {
            config = { serverUrl };
          }
          fs.writeFileSync('apps/desktop/installer-config.json', JSON.stringify(config, null, 2));
          console.log('Installer config:', JSON.stringify(config));
        env:
          PAYLOAD: ${{ github.event.client_payload }}
          SERVER_URL: ${{ inputs.serverUrl }}

      - name: Build desktop app
        run: |
          cd apps/desktop
          npx tsc -p tsconfig.main.json
          npx vite build

      - name: Package installer
        run: |
          cd apps/desktop
          npx electron-builder --config electron-builder.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer (${{ matrix.os }})
        uses: actions/upload-artifact@v4
        with:
          name: cc-models-installer-${{ matrix.os }}
          path: |
            apps/desktop/release/*.msi
            apps/desktop/release/*.dmg
            apps/desktop/release/*.AppImage
            apps/desktop/release/*.deb
            apps/desktop/release/*.exe
            apps/desktop/release/*.zip
            apps/desktop/release/*.yml
            apps/desktop/release/*.blockmap
          if-no-files-found: ignore
