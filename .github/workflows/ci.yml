name: CI

on:
  push:
    branches: [main, master, 'release/**']
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.vscode/**'
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @ccmodels/shared build
      - run: pnpm --filter @ccmodels/desktop lint 2>/dev/null || echo "No lint script"

  test-shared:
    name: Test (shared)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @ccmodels/shared build
      - run: pnpm --filter @ccmodels/shared test 2>/dev/null || echo "No tests"

  test-server:
    name: Test (server)
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "file:./test.db"
      JWT_SECRET: test-secret
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @ccmodels/shared build
      - run: pnpm --filter @ccmodels/server prisma:generate
      - run: pnpm --filter @ccmodels/server test -- --ci

  build-desktop:
    name: Build (desktop)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @ccmodels/shared build
      - name: Type-check main process
        run: pnpm --filter @ccmodels/desktop build:main 2>/dev/null || npx tsc -p apps/desktop/tsconfig.main.json --noEmit
      - name: Build renderer
        run: pnpm --filter @ccmodels/desktop build:renderer 2>/dev/null || (cd apps/desktop && npx vite build)

  build-server:
    name: Build (server)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @ccmodels/shared build
      - run: pnpm --filter @ccmodels/server build

  package:
    name: Package (Windows)
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    needs: [lint, test-server, build-desktop]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @ccmodels/shared build
      - name: Build desktop
        run: |
          cd apps/desktop
          npx tsc -p tsconfig.main.json
          npx vite build
      - name: Package with electron-builder
        run: pnpm --filter @ccmodels/desktop build:package 2>/dev/null || (cd apps/desktop && npx electron-builder --win --config electron-builder.yml)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
