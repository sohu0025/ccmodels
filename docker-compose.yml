version: "3.8"

services:
  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=${DATABASE_URL:-file:./data/cc-models.db}
      - JWT_SECRET=${JWT_SECRET:-cc-models-secret}
      - PORT=3000
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:5173,http://localhost:5174}
      - NODE_ENV=production
    volumes:
      - server-data:/app/apps/server/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/system-providers"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  server-data:
