appId: io.ccmodels.app
productName: CC Models
copyright: Copyright © 2026 CC Models

directories:
  output: release
  buildResources: resources

files:
  - dist/**/*

extraResources:
  - from: installer-config.json
    to: installer-config.json
    filter:
      - "**/*"
  - from: resources/icon.png
    to: icon.png
  - from: resources/tray-icon.png
    to: tray-icon.png

win:
  signAndEditExecutable: false
  target:
    - target: msi
      arch:
        - x64

mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  icon: resources/icon.icns
  category: public.app-category.developer-tools

linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
    - target: rpm
      arch:
        - x64
  icon: resources/icon.png
  category: Development

publish:
  provider: generic
  url: https://releases.cc-models.app
  channel: latest

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
